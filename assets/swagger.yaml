  securitySchemes:
    ApiKeyAuth:
      description: API Key authentication. Prefix with "dd-" when passing the key.
      in: header
      name: X-Datadata-Api-Key
      type: apiKey
    OAuth2AccessCode:
      description: OAuth2 Authorization Code flow
      flows:
        authorizationCode:
          authorizationUrl: https://www.datadata.com/auth/oauth/authorize
          refreshUrl: https://www.datadata.com/api/oauth2/token
          scopes:
            datasources:read: Read datasource info, list tables, and describe table schemas
            datasources:scan: Scan datasource schemas and manage table/column comments
            datasources:replace-file: Replace file backing a file-type datasource
            data-spaces:write: Create, describe, drop tables and insert rows in data spaces
            executions:get: Get execution details and status
            queries:execute: Execute saved queries
            queries:execute-adhoc: Execute adhoc queries with inline scripts
          tokenUrl: https://www.datadata.com/api/oauth2/token
      type: oauth2
externalDocs:
  description: ""
  url: ""
info:
  contact:
    name: API Support
    url: https://www.datadata.com/feedback/
  description: datadata platform public api
  termsOfService: https://www.datadata.com/terms-of-service
  title: Datadata API
  version: "1.0"
openapi: 3.1.0
paths:
  /api/mcp/v1:
    post:
      description:
        Streamable HTTP endpoint for the Model Context Protocol (MCP) server.
        Accepts JSON-RPC messages to interact with Datadata tools including datasources,
        data spaces, queries, and AI memory.
      requestBody:
        content:
          application/json:
            schema:
              type: object
          text/plain:
            schema:
              title: body
              type: object
        description: MCP JSON-RPC request
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: MCP JSON-RPC response
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Internal Server Error
      security:
        - ApiKeyAuth: []
        - OAuth2AccessCode: []
      summary: MCP server endpoint
      tags:
        - mcp
  /api/v1/auth/current:
    get:
      description:
        Returns the currently authenticated user, along with optional API
        key, session, and permissions info.
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: Current session data including user, apiKey, session, and permissions
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Unauthenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Forbidden
      security:
        - ApiKeyAuth: []
        - OAuth2AccessCode: []
      summary: Get current session
      tags:
        - auth
  /api/v1/data-spaces/{datasourceId}/create-table:
    post:
      description:
        Create a new table with specified columns in a data space. The
        datasource must belong to the authenticated user.
      parameters:
        - description: Datasource ID
          in: path
          name: datasourceId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api_v1_data_spaces.handleCreateTable.Data"
        description: Table definition
        required: true
      responses:
        "204":
          description: Table created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Invalid request parameters
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Unauthenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Forbidden or quota exceeded
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Datasource or data space not found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Internal server error
      security:
        - ApiKeyAuth: []
      summary: Create table in data space
      tags:
        - data-spaces
  /api/v1/data-spaces/{datasourceId}/describe-table:
    post:
      description: Returns column metadata for the specified table in a data space.
      parameters:
        - description: Datasource ID
          in: path
          name: datasourceId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api_v1_data_spaces.handleDescribeTable.Data"
        description: Table name
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: Column information
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Invalid request parameters
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Unauthenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Data space not found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Internal server error
      security:
        - ApiKeyAuth: []
      summary: Describe table in data space
      tags:
        - data-spaces
  /api/v1/data-spaces/{datasourceId}/drop-table:
    post:
      description:
        Drop the specified table from a data space. The datasource must
        belong to the authenticated user.
      parameters:
        - description: Datasource ID
          in: path
          name: datasourceId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api_v1_data_spaces.handleDropTable.Data"
        description: Table name
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: Table dropped
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Invalid request parameters
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Unauthenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Datasource or data space not found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/http_errors.Error"
          description: Internal server error
      security:
