  - description: Model Context Protocol server endpoint
    name: mcp
    x-displayName: MCP
  - description: Authentication and session management
    name: auth
    x-displayName: Auth
  - description: Data source operations including info, table listing, schema scanning, and file management
    name: datasources
    x-displayName: Datasources
  - description: Data Spaces table management (create, describe, drop, insert rows)
    name: data-spaces
    x-displayName: Data Spaces
  - description: Query execution (adhoc and saved queries)
    name: queries
    x-displayName: Queries
  - description: Query execution history and status
    name: executions
    x-displayName: Executions
servers:
